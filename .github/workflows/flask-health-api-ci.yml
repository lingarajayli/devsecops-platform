name: Flask Health API CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/flask-health-api/**"
      - ".github/workflows/flask-health-api-ci.yml"

  pull_request:
    branches:
      - main
    paths:
      - "apps/flask-health-api/**"
      - ".github/workflows/flask-health-api-ci.yml"

  workflow_dispatch:

jobs:
  test-and-build:
    name: Test and Build Flask Health API
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: apps/flask-health-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -v

      - name: Build Docker image
        run: docker build -t flask-health-api:ci .