name: Flask Health API Semgrep SAST

on:
  push:
    branches:
      - main
    paths:
      - "apps/flask-health-api/**"
      - ".github/workflows/flask-health-api-semgrep.yml"

  pull_request:
    branches:
      - main
    paths:
      - "apps/flask-health-api/**"
      - ".github/workflows/flask-health-api-semgrep.yml"

  workflow_dispatch:

jobs:
  semgrep-sast:
    name: Scan Flask App with Semgrep
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python for Semgrep
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
    
      - name: Install Semgrep
        run: python -m pip install semgrep    

      - name: Run Semgrep scan only on Flask app
        run: semgrep scan --config p/python apps/flask-health-api --error