name: Trivy Image Scan

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/trivy-image-scan.yml"
      - "labs/security/trivy/**"

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/trivy-image-scan.yml"
      - "labs/security/trivy/**"

  workflow_dispatch:

jobs:
  trivy:
    name: Scan Container Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan old vulnerable image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nginx:1.21
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: false

      - name: Scan improved image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nginx:stable-alpine
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: false