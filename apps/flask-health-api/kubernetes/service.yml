apiVersion: v1
kind: Service
metadata:
  name: flask-health-api
  namespace: flask-health-api
  labels:
    app.kubernetes.io/name: flask-health-api
    app.kubernetes.io/instance: flask-health-api-dev
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: devsecops-platform
    app.kubernetes.io/managed-by: kubectl
    environment: dev
    team: devsecops-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: flask-health-api
    app.kubernetes.io/instance: flask-health-api-dev
  ports:
    - name: http
      port: 5000
      targetPort: http
