apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-health-api
  namespace: flask-health-api
  labels:
    apps.kubernetes.io/name: flask-health-api
    apps.kubernetes.io/instance: flask-health-api-dev
    apps.kubernetes.io/component: api
    apps.kubernetes.io/part-of: devsecops-platform
    apps.kubernetes.io/managed-by: kubectl
    apps.kubernetes.io/version: "1.0.0"
    environment: dev
    team: devsecops-platform
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flask-health-api
      apps.kubernetes.io/instance: flask-health-api-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flask-health-api
        apps.kubernetes.io/instance: flask-health-api-dev
    spec:
      containers:
        - name: flask-health-api
          image: flask-health-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL