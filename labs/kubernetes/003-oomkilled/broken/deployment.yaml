apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo
  namespace: incident-labs
  labels:
    app: oom-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-demo
  template:
    metadata:
      labels:
        app: oom-demo
    spec:
      containers:
        - name: app
          image: python:3.13-alpine
          command:
            - python
            - -c
            - |
              print("Starting memory allocation test...")
              data = []
              while True:
                  data.append("x" * 1024 * 1024)
          resources:
            requests:
              memory: "16Mi"
              cpu: "50m"
            limits:
              memory: "32Mi"
              cpu: "100m"