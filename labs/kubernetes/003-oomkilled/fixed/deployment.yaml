apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo
  namespace: incident-labs
  labels:
    app: oom-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-demo
  template:
    metadata:
      labels:
        app: oom-demo
    spec:
      containers:
        - name: app
          image: python:3.13-alpine
          command:
            - python
            - -c
            - |
              import time
              print("Application running within memory limit")
              while True:
                  time.sleep(30)
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"