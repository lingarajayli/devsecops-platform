apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: incident-labs
  labels:
    app: crashloop-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-demo
  template:
    metadata:
      labels:
        app: crashloop-demo
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Starting application..."
              echo "Simulating application crash..."
              exit 1