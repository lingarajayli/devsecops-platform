apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-demo
  namespace: incident-labs
  labels:
    app: readiness-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: readiness-demo
  template:
    metadata:
      labels:
        app: readiness-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: readiness-demo
  namespace: incident-labs
spec:
  type: ClusterIP
  selector:
    app: readiness-demo
  ports:
    - port: 80
      targetPort: 80