apiVersion: apps/v1
kind: Deployment
metadata:
  name: imagepull-demo
  namespace: incident-labs
  labels:
    app: imagepull-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imagepull-demo
  template:
    metadata:
      labels:
        app: imagepull-demo
    spec:
      containers:
        - name: app
          image: nginx:does-not-exist
          ports:
            - containerPort: 80