apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-demo
  namespace: incident-labs
  labels:
    app: ingress-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-demo
  template:
    metadata:
      labels:
        app: ingress-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ingress-demo
  namespace: incident-labs
spec:
  type: ClusterIP
  selector:
    app: ingress-demo
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-demo
  namespace: incident-labs
spec:
  rules:
    - host: demo.local
      http:
        paths:
          - path: /app
            pathType: Prefix
            backend:
              service:
                name: ingress-demo
                port:
                  number: 80