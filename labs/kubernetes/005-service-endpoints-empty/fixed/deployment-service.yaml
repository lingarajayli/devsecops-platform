apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-endpoint-demo
  namespace: incident-labs
  labels:
    app: backend-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-demo
  template:
    metadata:
      labels:
        app: backend-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: service-endpoint-demo
  namespace: incident-labs
spec:
  type: ClusterIP
  selector:
    app: backend-demo
  ports:
    - port: 80
      targetPort: 80