apiVersion: apps/v1
kind: Deployment
metadata:
  name: good-nginx-fixed-tag
  namespace: default
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/instance: good-nginx-fixed-tag
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: kyverno-policy-lab
    app.kubernetes.io/version: "1.27"
    app.kubernetes.io/managed-by: kubectl
    environment: lab
    team: platform
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: good-nginx-fixed-tag
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx
        app.kubernetes.io/instance: good-nginx-fixed-tag
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: kyverno-policy-lab
        app.kubernetes.io/version: "1.27"
        app.kubernetes.io/managed-by: kubectl
        environment: lab
        team: platform
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80